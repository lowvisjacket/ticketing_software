<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Ticket</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f5f7fb;
            color: #333;
        }

        header {
            background: #1976d2;
            color: white;
            padding: 1rem 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,.15);
        }

        header h1 {
            font-size: 1.8rem;
        }

        .container {
            max-width: 850px;
            margin: 40px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,.1);
            padding: 30px;
        }

        .container h2 {
            margin-bottom: 25px;
            color: #1976d2;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        textarea {
            resize: vertical;
            min-height: 180px;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .row .form-group {
            flex: 1;
        }

        .buttons {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 22px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }

        .btn-primary {
            background: #1976d2;
            color: white;
        }

        .btn-primary:hover {
            background: #1565c0;
        }

        .btn-secondary {
            background: #757575;
            color: white;
        }

        .btn-secondary:hover {
            background: #616161;
        }
    </style>
</head>

<body>

<header>
    <h1>Submit a Ticket</h1>
</header>

<div class="container">

    <h2>New Ticket</h2>

    <form th:action="@{/tickets/newticket}" method="post">

        <div class="row">

            <div class="form-group">
                <label for="requestorName">Requestor Name</label>
                <input
                        type="text"
                        id="requestorName"
                        name="requestorName"
                        required>
            </div>

            <div class="form-group">
                <label for="department">Department</label>

                <select id="department" name="department" required>
                    <option value="">Select Department</option>
                    <option>IT</option>
                    <option>Engineering</option>
                    <option>Finance</option>
                    <option>Human Resources</option>
                    <option>Marketing</option>
                    <option>Sales</option>
                    <option>Operations</option>
                </select>

            </div>

        </div>


        <div class="form-group">
            <label for="title">Ticket Title</label>

            <input
                    type="text"
                    id="title"
                    name="title"
                    maxlength="100"
                    required>
        </div>


        <div class="form-group">
            <label for="description">Description</label>

            <textarea
                    id="description"
                    name="description"
                    placeholder="Describe the issue in as much detail as possible..."
                    required></textarea>
        </div>


        <div class="row">

            <div class="form-group">
                <label for="severity">Severity</label>

                <select id="severity" name="severity" required>
                    <option value="">Select Severity</option>
                    <option>LOW</option>
                    <option>MEDIUM</option>
                    <option>HIGH</option>
                    <option>CRITICAL</option>
                </select>

            </div>

            <div class="form-group">
                <label for="contact">Contact Email</label>

                <input
                        type="email"
                        id="contact"
                        name="contact">
            </div>

        </div>


        <div class="buttons">

            <button
                    type="button"
                    class="btn btn-secondary"
                    onclick="history.back()">
                Cancel
            </button>

            <button
                    type="submit"
                    class="btn btn-primary">
                Create Ticket
            </button>

        </div>

    </form>

</div>

</body>
</html>
