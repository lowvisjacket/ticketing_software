<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

    <meta charset="UTF-8">
    <title>Ticket Details</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            color:#333;
        }

        header{
            background:#1976d2;
            color:white;
            padding:20px 40px;
            box-shadow:0 2px 10px rgba(0,0,0,.15);
        }

        header h1{
            font-size:30px;
        }

        .container{
            max-width:900px;
            margin:40px auto;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,.1);
        }

        h2{
            color:#1976d2;
            margin-bottom:30px;
            text-align:center;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:25px;
        }

        .field{
            display:flex;
            flex-direction:column;
        }

        label{
            font-weight:bold;
            margin-bottom:8px;
            color:#555;
        }

        input,
        select,
        textarea{

            width:100%;
            padding:12px;

            border:1px solid #dcdcdc;
            border-radius:8px;

            background:#f8f9fa;
            font-size:15px;
        }

        input[readonly],
        textarea[readonly]{

            background:#eeeeee;

        }

        textarea{

            min-height:180px;
            resize:none;

        }

        .description{

            margin-top:30px;

        }

        .buttons{

            margin-top:35px;

            display:flex;
            justify-content:flex-end;
            gap:15px;

        }


        .btn{

            padding:12px 25px;

            border:none;
            border-radius:8px;

            cursor:pointer;

            font-size:15px;
            font-weight:bold;

            transition:.2s;

        }


        .primary{

            background:#1976d2;
            color:white;

        }

        .primary:hover{

            background:#1565c0;

        }


        .secondary{

            background:#757575;
            color:white;

        }

        .secondary:hover{

            background:#616161;

        }


        @media(max-width:700px){

            .grid{

                grid-template-columns:1fr;

            }

            .container{

                margin:20px;

            }

        }


    </style>

</head>


<body>


<header>

    <h1>Ticket Details</h1>

</header>



<div class="container">


    <form th:action="@{/tickets/{id}/update(id=${ticket.id})}"
          method="post">



        <h2 th:text="${ticket.title}">
            Ticket Title
        </h2>




        <div class="grid">



            <!-- Assigned Agent -->

            <div class="field">

                <label>Assigned Agent</label>


                <select name="agent"
                        sec:authorize="hasAnyRole('TECHNICIAN','ADMIN','SYSADMIN')">


                    <option value="">
                        Unassigned
                    </option>


                    <option th:each="agent : ${agents}"

                            th:if="${agent.department == ticket.department}"

                            th:value="${ticket.agent}"

                            th:selected="${agent.first_name + ' ' + agent.last_name == ticket.agent}"

                            th:text="${agent.first_name + ' ' + agent.last_name}">

                    </option>


                </select>



<!--                <input readonly-->

<!--                       sec:authorize="!hasAnyRole('TECHNICIAN','ADMIN','SYSADMIN')"-->

<!--                       th:value="${ticket.agent == null ? 'Unassigned' : ticket.agent}">-->


            </div>





            <!-- Status -->


            <div class="field">


                <label>Status</label>


                <select name="status"

                        sec:authorize="hasAnyRole('TECHNICIAN','ADMIN','SYSADMIN')">


                    <option value="OPEN"
                            th:selected="${ticket.ticket_status == 'OPEN'}">
                        OPEN
                    </option>


                    <option value="IN_PROGRESS"
                            th:selected="${ticket.ticket_status == 'IN_PROGRESS'}">
                        IN PROGRESS
                    </option>


                    <option value="RESOLVED"
                            th:selected="${ticket.ticket_status == 'RESOLVED'}">
                        RESOLVED
                    </option>


                    <option value="CLOSED"
                            th:selected="${ticket.ticket_status == 'CLOSED'}">
                        CLOSED
                    </option>


                </select>



<!--                <input readonly-->

<!--                       sec:authorize="!hasAnyRole('TECHNICIAN','ADMIN','SYSADMIN')"-->

<!--                       th:value="${ticket.ticket_status}">-->


            </div>





            <!-- Importance -->


            <div class="field">

                <label>Importance</label>


                <input readonly

                       th:value="${ticket.importance}">


            </div>





            <!-- Department -->


            <div class="field">

                <label>Department</label>


                <input readonly

                       th:value="${ticket.department}">


            </div>





            <!-- Date -->


            <div class="field">

                <label>Date</label>


                <input readonly

                       th:value="${ticket.ticket_date}">


            </div>





            <!-- Time -->


            <div class="field">

                <label>Time</label>


                <input readonly

                       th:value="${ticket.ticket_time}">


            </div>



        </div>





        <!-- Description -->


        <div class="description">


            <label>Description</label>


            <textarea readonly

                      th:text="${ticket.description}">

    </textarea>


        </div>





        <div class="buttons">


            <button type="button"

                    class="btn secondary"

                    onclick="history.back()">

                Back

            </button>




            <button type="submit"

                    class="btn primary"

                    sec:authorize="hasAnyRole('TECHNICIAN','ADMIN','SYSADMIN')">

                Save Changes

            </button>


        </div>




    </form>


</div>


</body>

</html>
